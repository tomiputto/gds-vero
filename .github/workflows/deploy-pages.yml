name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
        # pnpm version comes from package.json "packageManager" (pnpm@10.29.3) — do not add "version" here

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: "Security: pnpm audit (critical)"
        run: pnpm audit --prod --audit-level=critical

      - name: "Lint: docs (ESLint)"
        run: pnpm --filter docs lint

      - name: "Test: unit (Vitest)"
        run: pnpm test:unit

      - name: Build docs app
        run: pnpm --filter docs build
        env:
          BASE_PATH: "/GDS/"

      - name: SPA fallback for client-side routing
        run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
